name: Publish NuGet

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Resolve version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION (tag: $TAG)"

      - name: Pack (Source libraries only)
        run: |
          OUT="${{ github.workspace }}/artifacts"
          mkdir -p "$OUT"
          VER="${{ steps.ver.outputs.version }}"
          for proj in \
            Source/Communication.Shared/Communication.Shared.csproj \
            Source/Communication.Network.TCP.Client/Communication.Network.TCP.Client.csproj \
            Source/Communication.Network.TCP.Server/Communication.Network.TCP.Server.csproj \
            Source/Communication.Network.TCP.Shared/Communication.Network.TCP.Shared.csproj \
            Source/Communication.Network.TCP_IOCP.Client/Communication.Network.TCP_IOCP.Client.csproj \
            Source/Communication.Network.TCP_IOCP.Server/Communication.Network.TCP_IOCP.Server.csproj \
            Source/Communication.Network.TCP_IOCP.Shared/Communication.Network.TCP_IOCP.Shared.csproj \
            Source/Communication.Network.RUDP.Client/Communication.Network.RUDP.Client.csproj \
            Source/Communication.Network.RUDP.Server/Communication.Network.RUDP.Server.csproj \
            Source/Communication.Network.RUDP.Shared/Communication.Network.RUDP.Shared.csproj
          do
            dotnet pack "$proj" \
              -c Release \
              -o "$OUT" \
              -p:Version="$VER" \
              -p:PackageVersion="$VER" \
              --verbosity minimal
          done

      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "NUGET_API_KEY secret is not set."
            exit 1
          fi
          dotnet nuget push "${{ github.workspace }}/artifacts/*.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
